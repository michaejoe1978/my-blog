<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1 class="app__title">2048</h1>
      <div class="scoreboard">
        <div class="scoreboard__box">
          <span class="scoreboard__label">SCORE</span>
          <span class="scoreboard__value" id="currentScore">0</span>
        </div>
        <div class="scoreboard__box">
          <span class="scoreboard__label">BEST</span>
          <span class="scoreboard__value" id="bestScore">0</span>
        </div>
      </div>
    </header>

    <div class="app__controls">
      <p class="app__hint">방향키 또는 스와이프로 타일을 이동하세요. 같은 숫자가 만나면 합쳐집니다.</p>
      <button type="button" class="btn btn--new-game" id="newGameBtn">새 게임</button>
    </div>

    <main class="board-wrap">
      <div class="board" id="board" aria-label="2048 게임 보드">
        <div class="board__grid" id="boardGrid"></div>
        <div class="board__tiles" id="boardTiles"></div>

        <div class="overlay overlay--hidden" id="winOverlay">
          <div class="overlay__panel">
            <p class="overlay__title">You Win!</p>
            <div class="overlay__actions">
              <button type="button" class="btn btn--primary" id="keepGoingBtn">계속하기</button>
              <button type="button" class="btn" id="winNewGameBtn">새 게임 시작</button>
            </div>
          </div>
        </div>

        <div class="overlay overlay--hidden" id="gameOverOverlay">
          <div class="overlay__panel">
            <p class="overlay__title">Game Over</p>
            <p class="overlay__score">최종 점수: <span id="finalScore">0</span></p>
            <div class="overlay__actions">
              <button type="button" class="btn btn--primary" id="restartBtn">다시 시작</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
