<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="#" class="header__logo">My Blog</a>
      <button class="theme-toggle" id="themeToggle" aria-label="다크 모드 전환">
        <span class="theme-toggle__icon" id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <main class="main">
    <section class="app-section">
      <h2 class="app-section__title">미니 웹앱</h2>
      <div class="app-card">
        <div class="app-card__preview">
          <iframe class="app-card__iframe" src="apps/2048/index.html" title="2048 게임 미리보기" loading="lazy"></iframe>
        </div>
        <div class="app-card__body">
          <h3 class="app-card__title">2048</h3>
          <p class="app-card__desc">방향키로 숫자 타일을 밀어서 합치는 퍼즐 게임. 점수판과 최고 점수 기록을 지원합니다.</p>
          <a class="app-card__link" href="apps/2048/index.html">전체 화면으로 플레이 &rarr;</a>
        </div>
      </div>
    </section>

    <section class="post-list" id="postList"></section>
    <article class="post-view" id="postView" hidden>
      <a href="#" class="post-view__back">&larr; 목록으로</a>
      <div class="post-view__content" id="postContent"></div>
    </article>
  </main>

  <footer class="footer">
    <p>&copy; 2026 My Blog. Built with Markdown.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
